services:
  mlflow:
    image: python:3.12-slim
    command:
      - /bin/sh
      - -c
      - |
        pip install --no-cache-dir "mlflow>=2.14,<3.0" &&
        mlflow server \
          --backend-store-uri file:/mlflow/mlruns \
          --default-artifact-root /mlflow/artifacts \
          --host 0.0.0.0 \
          --port 5000
    ports:
      - "5001:5000"
    volumes:
      - ./mlflow:/mlflow

  classifier:
    build:
      context: ./services/classifier
    environment:
      CHAMPION_MODEL_PATH: /mlflow-artifacts/champion_classifier.json
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./mlflow/artifacts:/mlflow-artifacts:ro
    depends_on:
      - mlflow

  llm:
    build:
      context: ./services/llm
    command:
      - -m
      - /models/qwen-model.gguf
      - --host
      - 0.0.0.0
      - --port
      - "11434"
      - -c
      - "2048"
      - -n
      - "256"
    ports:
      - "11434:11434"

  orchestrator:
    build:
      context: ./services/orchestrator
    environment:
      CLASSIFIER_URL: http://classifier:8000
      LLM_BASE_URL: http://llm:11434
      LLM_MODEL: qwen2.5-0.5b-instruct
    ports:
      - "6872:8000"
    depends_on:
      - classifier
      - llm

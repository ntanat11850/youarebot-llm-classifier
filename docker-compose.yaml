services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 20

  classifier:
    build:
      context: ./services/classifier
    ports:
      - "8014:8001"
    environment:
      APP_PORT: "8001"
      MODEL_NAME: champion-keyword-bot-classifier
      MODEL_VERSION: local-session-13

  orchestrator:
    build:
      context: ./services/orchestrator
    depends_on:
      classifier:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "6872:8000"
    environment:
      APP_PORT: "8000"
      CLASSIFIER_URL: http://classifier:8001
      DATABASE_URL: postgresql://app:app@postgres:5432/app
      REQUEST_TIMEOUT_SECONDS: "2.0"
      DB_CONNECT_RETRIES: "30"
      DB_CONNECT_SLEEP_SECONDS: "1.0"
